<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PEOS Management System - Login</title>
    <link rel="icon" type="image/png" href="./images/favicon.png" />
    <link href="./css/app.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }

      @font-face {
        font-family: 'UnifrakturMaguntia';
        src: url('./fonts/UnifrakturMaguntia.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(37, 99, 235, 0.35),
            transparent 25%
          ),
          radial-gradient(
            circle at top right,
            rgba(248, 113, 113, 0.25),
            transparent 23%
          ),
          radial-gradient(
            circle at bottom left,
            rgba(249, 115, 22, 0.15),
            transparent 28%
          ),
          linear-gradient(180deg, #0a1628 0%, #0d2a45 50%, #051020 100%);
        display: grid;
        place-items: center;
        color: #111827;
      }

      .page-shell {
        width: min(100vw - 80px, 780px);
        margin: 62px auto;
      }

      .login-card {
        position: relative;
        display: grid;
        grid-template-columns: minmax(240px, 1fr) minmax(265px, 0.92fr);
        overflow: hidden;
        border-radius: 24px;
        box-shadow: 
          0 0 60px rgba(15, 23, 42, 0.5),
          0 25px 50px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(12px);
      }

      .accent-bar {
        position: absolute;
        inset: 0 0 auto;
        height: 3px;
        display: flex;
        z-index: 10;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      .accent-bar span {
        flex: 1;
        border-radius: 0;
      }

      .accent-bar span:nth-child(1) {
        background: linear-gradient(90deg, #1d4ed8, #2563eb);
      }

      .accent-bar span:nth-child(2) {
        background: linear-gradient(90deg, #cbd5e1, #e2e8f0);
      }

      .accent-bar span:nth-child(3) {
        background: linear-gradient(90deg, #dc2626, #ef4444);
      }

      .accent-bar span:nth-child(4) {
        background: linear-gradient(90deg, #facc15, #fbbf24);
      }

      .brand-panel {
        background: linear-gradient(135deg, #0f1d45 0%, #1a3a6e 40%, #152d52 100%);
        color: #f8fafc;
        padding: 34px 26px;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 20px;
      }

      .brand-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at 25% 20%,
            rgba(255, 255, 255, 0.15),
            transparent 22%
          ),
          radial-gradient(
            circle at 80% 15%,
            rgba(59, 130, 246, 0.12),
            transparent 20%
          ),
          radial-gradient(
            circle at 20% 80%,
            rgba(249, 115, 22, 0.08),
            transparent 25%
          );
        opacity: 1;
        pointer-events: none;
      }

      .brand-panel > * {
        position: relative;
        z-index: 1;
      }

      .brand-logo-wrap {
        width: 118px;
        height: 118px;
        border-radius: 999px;
        background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
        display: grid;
        place-items: center;
        overflow: hidden;
        margin: 0 auto;
        border: 3px solid rgba(255, 255, 255, 0.4);
        box-shadow: 
          0 10px 40px rgba(59, 130, 246, 0.25),
          0 0 20px rgba(255, 255, 255, 0.2),
          inset 0 1px 2px rgba(255, 255, 255, 0.8);
      }

      .brand-logo-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: inherit;
        display: block;
      }

      .brand-caption {
        text-align: center;
      }

      .brand-caption .small-title {
        text-transform: uppercase;
        letter-spacing: 0.45em;
        font-size: 0.7rem;
        color: rgba(248, 250, 252, 0.85);
        margin-bottom: 10px;
        font-weight: 700;
      }

      .brand-caption h2 {
        font-size: clamp(1.7rem, 2.4vw, 2.15rem);
        line-height: 1.1;
        margin: 0;
        font-weight: 900;
        letter-spacing: -0.02em;
        font-family: "Old English Text MT", "UnifrakturMaguntia", serif;
        background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .brand-caption p {
        margin: 10px auto 0;
        max-width: 250px;
        color: rgba(248, 250, 252, 0.88);
        font-size: 0.9rem;
        font-weight: 500;
        line-height: 1.5;
      }

      .brand-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 20px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(249, 115, 22, 0.15), rgba(59, 130, 246, 0.1));
        color: #fbbf24;
        font-size: 0.73rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: 1.5px solid rgba(251, 191, 36, 0.4);
        font-weight: 700;
        box-shadow: 
          0 4px 12px rgba(249, 115, 22, 0.12),
          inset 0 1px 2px rgba(255, 255, 255, 0.15);
      }

      .brand-footer {
        margin-top: auto;
        text-align: center;
        color: rgba(248, 250, 252, 0.78);
        font-size: 0.8rem;
        line-height: 1.6;
        padding-top: 18px;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
      }

      .brand-footer strong {
        color: #fbbf24;
        font-weight: 700;
      }

      .form-panel {
        background: linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
        padding: 26px 22px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .tabs {
        display: inline-flex;
        border-radius: 12px;
        padding: 4px;
        gap: 8px;
        background: transparent;
      }

      .tab {
        padding: 9px 20px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 0.84rem;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      .tab.active {
        background: transparent;
        color: #1e40af;
        box-shadow: none;
      }

      .tab.inactive {
        color: #64748b;
      }

      .form-heading h1 {
        margin: 0;
        font-size: clamp(2rem, 2.5vw, 2.45rem);
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: #0f172a;
        font-family: Inter, 'Segoe UI', ui-sans-serif, system-ui, sans-serif;
        font-weight: 800;
        text-align: center;
      }

      .form-heading p {
        margin: 8px 0 0;
        color: #64748b;
        font-size: 0.86rem;
        font-weight: 500;
        line-height: 1.5;
      }

      .login-heading-icon {
        width: 112px;
        height: 112px;
        margin: 14px auto 0;
        border-radius: 999px;
        position: relative;
        overflow: hidden;
        display: grid;
        place-items: center;
        background: radial-gradient(
            circle at 30% 18%,
            rgba(59, 130, 246, 0.2),
            rgba(59, 130, 246, 0)
          ),
          linear-gradient(145deg, #0f2b63 0%, #0a2a59 100%);
        border: 2px solid rgba(255, 255, 255, 0.16);
        box-shadow:
          0 16px 34px rgba(15, 23, 42, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        animation:
          iconFloat 4.2s ease-in-out infinite,
          iconPulseGlow 3.2s ease-in-out infinite;
      }

      .login-heading-icon::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          rgba(255, 255, 255, 0) 25%,
          rgba(255, 255, 255, 0.35) 50%,
          rgba(255, 255, 255, 0) 75%
        );
        transform: translateX(-135%);
        animation: iconShine 3.8s linear infinite;
        pointer-events: none;
      }

      .login-heading-icon svg {
        width: 66px;
        height: 66px;
        color: #ffffff;
        animation: iconBreath 2.4s ease-in-out infinite;
        transform-origin: 50% 50%;
      }

      @keyframes iconFloat {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      @keyframes iconPulseGlow {
        0%,
        100% {
          box-shadow:
            0 16px 34px rgba(15, 23, 42, 0.28),
            0 0 0 0 rgba(37, 99, 235, 0.2),
            inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }
        50% {
          box-shadow:
            0 20px 42px rgba(15, 23, 42, 0.33),
            0 0 0 8px rgba(37, 99, 235, 0),
            inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }
      }

      @keyframes iconShine {
        0% {
          transform: translateX(-135%);
        }
        100% {
          transform: translateX(135%);
        }
      }

      @keyframes iconBreath {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.06);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .login-heading-icon,
        .login-heading-icon::after,
        .login-heading-icon svg {
          animation: none;
        }
      }

      #loginForm {
        margin-top: 18px;
      }

      .field-group {
        display: grid;
        gap: 8px;
      }

      .field-group label {
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #1e293b;
        text-transform: uppercase;
      }

      .input-box {
        position: relative;
      }

      .input-box input {
        width: 100%;
        border-radius: 10px;
        border: 1.5px solid #dbeafe;
        background: linear-gradient(135deg, #f8fbff 0%, #ffffff 100%);
        color: #0f172a;
        padding: 11px 13px 11px 40px;
        font-size: 0.88rem;
        transition: all 200ms ease;
      }

      .input-box input:focus {
        outline: none;
        border-color: #2563eb;
        background: #ffffff;
        box-shadow: 
          0 0 0 4px rgba(37, 99, 235, 0.1),
          0 4px 12px rgba(37, 99, 235, 0.08);
      }

      .input-box input::placeholder {
        color: rgba(100, 116, 139, 0.7);
      }

      .input-box.password-box input {
        padding-right: 42px;
      }

      .input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        color: #475569;
        transition: color 200ms ease;
      }

      .password-toggle-btn {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        border: none;
        background: transparent;
        color: #475569;
        cursor: pointer;
        padding: 0;
      }

      .password-toggle-btn:hover {
        color: #1d4ed8;
      }

      .password-toggle-btn svg {
        width: 16px;
        height: 16px;
      }

      .login-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 11px 14px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 50%, #1e40af 100%);
        color: #ffffff;
        font-weight: 800;
        font-size: 0.9rem;
        cursor: pointer;
        transition:
          transform 200ms cubic-bezier(0.4, 0, 0.2, 1),
          box-shadow 200ms ease,
          background 200ms ease;
        box-shadow: 0 8px 20px rgba(29, 78, 216, 0.25);
      }

      .login-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 32px rgba(29, 78, 216, 0.35);
      }

      .login-button:active {
        transform: translateY(0);
      }

      .form-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .form-footer a {
        color: #1d4ed8;
        text-decoration: none;
        font-weight: 600;
      }

      .form-footer .disclaimer {
        color: #64748b;
        font-size: 0.92rem;
      }

      .error-message {
        padding: 16px 18px;
        border-radius: 12px;
        background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
        color: #991b1b;
        font-size: 0.94rem;
        border: 1.5px solid #fca5a5;
        font-weight: 600;
        box-shadow: 0 4px 12px rgba(220, 38, 38, 0.1);
      }

      @media (max-width: 860px) {
        .login-card {
          grid-template-columns: 1fr;
          border-radius: 20px;
        }

        .brand-panel {
          padding: 28px 22px;
        }

        .form-panel {
          padding: 24px 20px;
        }
      }

      @media (max-width: 540px) {
        body {
          margin: 0;
        }

        .page-shell {
          margin: 0;
          width: 100%;
        }

        .login-card {
          border-radius: 0;
          box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .brand-panel,
        .form-panel {
          padding: 32px 24px;
        }

        .brand-logo-wrap {
          width: 120px;
          height: 120px;
        }

        .brand-logo-wrap img {
          width: 100%;
          height: 100%;
        }

        .tabs {
          width: 100%;
          justify-content: space-between;
        }

        .tab {
          flex: 1;
          text-align: center;
          padding: 12px 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="login-card">
        <div class="accent-bar">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="brand-panel">
          <div class="brand-logo-wrap">
            <img src="images/OIP.jpg" alt="DMW Logo" />
          </div>
          <div class="brand-caption">
            <div class="small-title">Republic of the Philippines</div>
            <h2>Department of Migrant Workers</h2>
            <p>Regional Office XIII (Caraga)</p>
          </div>
          <div class="brand-badge">
           PEOS Inventory Management System
          </div>
          <div class="brand-footer">
           
            <div>© 2026 DMW Caraga. All rights reserved.</div>
          </div>
        </div>

        <div class="form-panel">
            

          <div class="form-heading">
            <h1>Welcome Back</h1>
            <div class="login-heading-icon" aria-label="User icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </div>
          </div>

          <form id="loginForm" class="field-group" autocomplete="off">
            <div class="field-group">
              <label for="username">Username</label>
              <div class="input-box">
                <span class="input-icon" aria-hidden="true">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                  </svg>
                </span>
                <input
                  id="username"
                  name="username"
                  type="text"
                  required
                  placeholder="Enter your username"
                />
              </div>
            </div>

            <div class="field-group">
              <label for="password">Password</label>
              <div class="input-box password-box">
                <span class="input-icon" aria-hidden="true">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                  </svg>
                </span>
                <input
                  id="password"
                  name="password"
                  type="password"
                  required
                  placeholder="Enter your password"
                />
                <button
                  id="passwordToggle"
                  type="button"
                  class="password-toggle-btn"
                  aria-label="Show password"
                  title="Show password"
                >
                  <svg
                    id="eyeOpenIcon"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <svg
                    id="eyeClosedIcon"
                    class="hidden"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.77 21.77 0 0 1 5.06-6.94" />
                    <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.77 21.77 0 0 1-2.16 3.19" />
                    <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                </button>
              </div>
            </div>

            <button type="submit" class="login-button">
              <span>Sign In</span>
            </button>
          </form>

          <div id="error" class="error-message hidden">
            Invalid credentials. Please try again.
          </div>

         
          </div>
        </div>
      </div>
    </div>

    <script>
      const passwordInput = document.getElementById("password");
      const passwordToggleBtn = document.getElementById("passwordToggle");
      const eyeOpenIcon = document.getElementById("eyeOpenIcon");
      const eyeClosedIcon = document.getElementById("eyeClosedIcon");
      const loginForm = document.getElementById("loginForm");
      const errorBox = document.getElementById("error");

      if (passwordToggleBtn && passwordInput) {
        passwordToggleBtn.addEventListener("click", function () {
          const showingPassword = passwordInput.type === "text";
          passwordInput.type = showingPassword ? "password" : "text";
          passwordToggleBtn.setAttribute(
            "aria-label",
            showingPassword ? "Show password" : "Hide password",
          );
          passwordToggleBtn.title = showingPassword
            ? "Show password"
            : "Hide password";

          if (eyeOpenIcon && eyeClosedIcon) {
            eyeOpenIcon.classList.toggle("hidden", !showingPassword);
            eyeClosedIcon.classList.toggle("hidden", showingPassword);
          }
        });
      }

      loginForm.addEventListener("submit", function (e) {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const password = passwordInput.value;

        if (username === "staff" && password === "password") {
          localStorage.setItem("loggedIn", "true");
          localStorage.setItem("username", "Staff User");
          window.location.href = "dashboard.html";
        } else {
          errorBox.classList.remove("hidden");
        }
      });
    </script>
  </body>
</html>
